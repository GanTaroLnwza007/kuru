name: Secret Scanning — Gitleaks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Also run on a schedule to catch secrets that may have slipped into history
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read
  # Required to post findings to the Security tab
  security-events: write

jobs:
  gitleaks:
    name: Detect secrets with Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so Gitleaks can scan all commits, not just HEAD
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Set to "true" to upload SARIF results to the Security tab
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"
