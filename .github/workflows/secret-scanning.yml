name: Secret Scanning — Gitleaks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Also run on a schedule to catch secrets that may have slipped into history
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read
  # Required to post findings to the Security tab
  security-events: write

jobs:
  gitleaks:
    name: Detect secrets with Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Fetch full history so Gitleaks can scan all commits, not just HEAD
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')_linux_x64.tar.gz | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks
        run: gitleaks detect --source . --log-opts="HEAD" --redact --no-banner
